<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shopzilla" />
    <meta name="author" content="Arpit" />
    <title>Sign up</title>
    <link rel="icon" type="image/png" href="/assets/e-commerce.png"/>
    <link rel="stylesheet" href="/css/authentication.css" />
  </head>
  <body>
    <section class="container">
      <img class="img" src="/assets/e-commerce.png" alt="logo" /><br /><br />
      <div class="heading">
        <p><strong>SIGN UP</strong></p>
        <small>See your growth and consulting support</small>
      </div>
      <br />
      <form action="login">
        <label for="FirstName">FirstName</label><br />
        <input class="inp" type="text" placeholder="Firstname" required /><br />
        <label for="LastName">LastName</label><br />
        <input class="inp" type="text" placeholder="Lastname" required /><br />
        <label for="Email">Email</label><br />
        <input
          class="inp"
          type="text"
          placeholder="mail@gmail.com"
          required
        /><br />
        <label for="Password">Password</label><br />
        <input
          class="inp"
          type="password"
          placeholder="Min. 8 characters"
          required
        /><br />
        <input class="submit" type="submit" name="" />
      </form>
      <p>Already have an account?
        <a class="signin-link" href="/pages/login.html">Sign In</a>
      </p>
    </section>
  </body>
</html>
