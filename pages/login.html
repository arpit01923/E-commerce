<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shopzilla">
    <meta name="author" content="Arpit">
    <title>Login</title>
    <link rel="stylesheet" href="/css/authentication.css">
</head>
<body>
    <section class="container">
        <img class="img" src="/e-commerce.png" alt="logo"><br><br>
        <div class="heading">
            <p><strong>LOGIN</strong></p>
            <small>See your growth and consulting support</small>
        </div><br>
        <a class="signin" href="">Sign in with Google</a>
        <br><br><br>
        <form action="login">
            <label for="Email">Email</label><br>
            <input class="inp" type="text" placeholder="mail@gmail.com" required><br>
            <label for="Password">Password</label><br>
            <input class="inp" type="password" placeholder="Min. 8 characters" required><br>
            <input class="submit" type="submit" name="">
        </form>
    </section>
</body>
</html>
